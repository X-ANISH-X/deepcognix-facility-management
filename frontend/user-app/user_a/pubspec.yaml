name: user_a
description: "Facility Management User App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # STATE MANAGEMENT
  get: ^4.6.6
  get_storage: ^2.1.1


  # LOCATION PERMISSION
  permission_handler: ^11.3.1

  # HTTP API
  http: ^1.2.2

  # OPEN PHONE / URL
  url_launcher: ^6.3.0

  # LOCALIZATION
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/map.png